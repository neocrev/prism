<svg xmlns="http://www.w3.org/2000/svg" width="540" height="170" viewBox="0 0 540 170"><rect width="540" height="170" rx="8" fill="#1e1e2e"/><circle cx="16" cy="16" r="5" fill="#ff5f58"/><circle cx="32" cy="16" r="5" fill="#ffbd2e"/><circle cx="48" cy="16" r="5" fill="#18c132"/><style>.p{fill:#a6e3a1;font:14px Monaco,monospace}.l{font:bold 16px Monaco,monospace}</style><text x="20" y="46" class="p">$ prism --rainbow "Hello World"</text><text x="20" y="72" fill="#ff0066" class="l">H</text><text x="31" y="72" fill="#e61475" class="l">e</text><text x="42" y="72" fill="#cc2985" class="l">l</text><text x="53" y="72" fill="#b33d94" class="l">l</text><text x="64" y="72" fill="#9952a3" class="l">o</text><text x="75" y="72" fill="#8066b3" class="l"> </text><text x="86" y="72" fill="#667ac2" class="l">W</text><text x="97" y="72" fill="#4d8fd1" class="l">o</text><text x="108" y="72" fill="#33a3e0" class="l">r</text><text x="119" y="72" fill="#1ab8f0" class="l">l</text><text x="130" y="72" fill="#00ccff" class="l">d</text><text x="20" y="98" class="p"></text><text x="20" y="124" class="p">$ prism --big "COOL" --shimmer</text><text x="20" y="150" fill="#ffcc00" class="l">C</text><text x="31" y="150" fill="#ff8822" class="l">O</text><text x="42" y="150" fill="#ff4444" class="l">O</text><text x="53" y="150" fill="#ff0066" class="l">L</text></svg>